<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080F1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>OPJ Examen — Qualification OPJ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <!-- CSS dans cet ordre exact -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="stylesheet" href="css/new-modules.css">
</head>
<body>

  <!-- Écran de chargement initial -->
  <div id="splash-screen">
    <div class="splash-logo">
      <img src="assets/icons/icon-192.png" alt="" class="splash-logo-img" width="120" height="120">
    </div>
    <div class="splash-bar">
      <div class="splash-bar-fill"></div>
    </div>
  </div>

  <!-- Conteneur principal de l'app -->
  <div id="app" class="app-container" style="display:none">

    <!-- Header fixe : logo OPJ cliquable → accueil (caché pendant l'onboarding) -->
    <header id="app-header" class="app-header" style="display:none">
      <button type="button" class="logo-home-btn" onclick="goHome()" aria-label="Retour accueil">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <path d="M14 2L24 7V15C24 20.5 19.5 24.5 14 26C8.5 24.5 4 20.5 4 15V7L14 2Z" fill="rgba(245,166,35,0.15)" stroke="#F5A623" stroke-width="1.5"/>
          <path d="M10 14L12.5 16.5L18 11" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-home-text">OPJ</span>
      </button>
    </header>

    <!-- Zone de rendu des écrans (le router injecte ici) -->
    <main id="screen-container" class="screen-container"></main>

    <!-- Navigation bottom (cachée pendant l'onboarding) -->
    <nav id="nav-bar" class="nav-bar" style="display:none">
      <button type="button" class="nav-item" data-route="home" aria-label="Accueil">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Accueil</span>
      </button>
      <button type="button" class="nav-item" data-route="learn" aria-label="Apprendre">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="16" y2="11"/></svg>
        <span class="nav-label">Apprendre</span>
      </button>
      <button type="button" class="nav-item" data-route="train" aria-label="S'entraîner">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        <span class="nav-label">S'entraîner</span>
      </button>
      <button type="button" class="nav-item" data-route="cartouches" aria-label="Procédure">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span class="nav-label">Procédure</span>
      </button>
      <button type="button" class="nav-item" data-route="profile" aria-label="Moi">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="nav-label">Moi</span>
      </button>
    </nav>

    <!-- Zone des toasts -->
    <div id="toast-container"></div>

    <!-- Zone des overlays/modals -->
    <div id="modal-container"></div>

  </div>

  <!-- Scripts classiques, ordre garanti, sans type="module" -->
  <!-- Données -->
  <script src="data/lessons/dpg.js"></script>
  <script src="data/lessons/dps.js"></script>
  <script src="data/lessons/pp.js"></script>
  <script src="data/questions-ep1.js"></script>
  <script src="data/questions-ep2.js"></script>
  <script src="data/infractions.js"></script>
  <script src="data/cartouches.js"></script>
  <script src="data/comptes-rendus.js"></script>
  <script src="data/cas-pratiques.js"></script>
  <script src="data/actus-juridiques.js"></script>

  <!-- Core -->
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/router.js"></script>

  <!-- Modules -->
  <script src="js/modules/notifications.js"></script>
  <script src="js/modules/gamification.js"></script>
  <script src="js/modules/paywall.js"></script>
  <script src="js/modules/onboarding.js"></script>
  <script src="js/modules/home.js"></script>
  <script src="js/modules/qcm.js"></script>
  <script src="js/modules/infractions.js"></script>
  <script src="js/modules/cartouches.js"></script>
  <script src="js/modules/compteRendu.js"></script>
  <script src="js/modules/lessons.js"></script>
  <script src="js/modules/flashcards.js"></script>
  <script src="js/modules/casePratique.js"></script>
  <script src="js/modules/diagnostic.js"></script>
  <script src="js/modules/share.js"></script>
  <script src="js/modules/examMode.js"></script>
  <script src="js/modules/leaderboard.js"></script>

  <!-- Point d'entrée — TOUJOURS EN DERNIER -->
  <script src="js/app.js"></script>

</body>
</html>
